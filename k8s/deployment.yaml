apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-portfolio
  namespace: default
  labels:
    app: blog-portfolio
spec:
  replicas: 2 # 高可用双副本部署
  selector:
    matchLabels:
      app: blog-portfolio
  template:
    metadata:
      labels:
        app: blog-portfolio
    spec:
      # 安全规范：禁止特权容器运行，限制运行用户
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # Nginx alpine 默认的 nginx 用户 UID
        fsGroup: 101
      containers:
        - name: blog-web
          image: registry.cn-chengdu.aliyuncs.com/22-7-co/blog-portfolio:latest # 示例 ACR 镜像地址
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          # 资源限制与预约 (SRE 资源管理必备)
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # 健康检查探针 (Liveness / Readiness)
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: blog-portfolio-svc
  namespace: default
  labels:
    app: blog-portfolio
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: blog-portfolio
  type: ClusterIP
