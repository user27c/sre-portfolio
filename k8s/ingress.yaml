apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-portfolio-ingress
  namespace: default
  annotations:
    # 启用 Nginx Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    # 配置 cert-manager 自动申请与更新 Let's Encrypt 证书 (展示 SSL/TLS 自动化治理)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # 配置客户端主体请求限制
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # 强制将 HTTP 流量重定向到 HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - blog.22-7.co # 示例个人域名，面试官可访问的地址
      secretName: blog-portfolio-tls-secret # 存放 SSL 证书的 K8s Secret
  rules:
    - host: blog.22-7.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blog-portfolio-svc
                port:
                  number: 80
