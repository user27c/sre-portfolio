name: 发布 Hugo 网站到 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Rebuild /projects/ when GitHub repos change (static site = snapshot at deploy time)
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC (14:00 Asia/Shanghai)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 安装 Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: true

      - name: 刷新 GitHub 项目数据
        run: |
          chmod +x scripts/fetch-github.sh
          ./scripts/fetch-github.sh

      - name: 设置 GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: 使用 Hugo 构建
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send QQ Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.QQ_EMAIL }}
          password: ${{ secrets.QQ_SMTP_AUTH }}
          subject: "${{ needs.deploy.result == 'success' && '✅ Hugo部署成功' || '❌ Hugo部署失败' }} - ${{ github.repository }}"
          to: ${{ secrets.QQ_EMAIL }}
          from: ${{ secrets.QQ_EMAIL }}
          secure: true
          body: |
            项目: ${{ github.repository }}
            状态: ${{ needs.deploy.result }}
            提交人: ${{ github.actor }}
            提交信息: ${{ github.event.head_commit.message }}

            查看 Action 运行详情:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            在线预览：https://${{ github.repository_owner }}.github.io/
          html_body: false
